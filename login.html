<!DOCTYPE html>
<html lang="es">

<head>

    <!-- ========================================
                CONFIGURACIÓN BÁSICA
    ========================================= -->
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- Estilos -->
    <link
        rel="stylesheet"
        href="login.css">

</head>

<body>

    <!-- ========================================
                    TOAST
    ========================================= -->
    <div id="toast"></div>


    <!-- ========================================
                CONTENEDOR LOGIN
    ========================================= -->
    <div class="login-container">

        <!-- Logo -->
        <img
            src="Imagenes/Logo.png"
            class="logo">

        <!-- Título -->
        <h1>Iniciar sesión</h1>


        <!-- ========================================
                    FORMULARIO
        ========================================= -->

        <!-- Correo -->
        <input
            type="email"
            id="email"
            placeholder="Correo">

        <!-- Contraseña -->
        <input
            type="password"
            id="password"
            placeholder="Contraseña">


        <!-- Botón login -->
        <button onclick="login()">

            Ingresar

        </button>


        <!-- Registro -->
        <p class="switch-auth">

            ¿No tienes cuenta?

            <a href="register.html">

                Regístrate

            </a>

        </p>


        <!-- Recuperar contraseña -->
        <button
            class="forgot-btn"
            onclick="recuperarPassword()">

            Recuperar contraseña

        </button>

    </div>


    <!-- ========================================
                    SCRIPTS
    ========================================= -->

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Auth -->
    <script src="auth.js"></script>

    <!-- Verificar usuario -->
    <script>

        verificarUsuarioLogueado();

    </script>

</body>

</html>
